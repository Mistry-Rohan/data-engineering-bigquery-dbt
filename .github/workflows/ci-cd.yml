name: CI/CD

on:
  workflow_dispatch:

jobs:
  validate-repo:
    name: Validate Repository
    runs-on: ubuntu-latest
    env:
      GCP_PROJECT_ID: ci-placeholder-project
      GCP_REGION: us-central1
      BQ_BRONZE_DATASET: taxi_bronze
      BQ_SILVER_DATASET: taxi_silver
      BQ_GOLD_DATASET: taxi_gold
      DBT_PROFILES_DIR: ${{ github.workspace }}/dbt/profiles
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r composer/requirements.txt

      - name: Validate Python syntax
        run: |
          python -m compileall composer

      - name: Validate pipeline config YAML
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml

          config_path = Path("composer/include/config/pipeline_config.yaml")
          with open(config_path, "r", encoding="utf-8") as config_file:
              data = yaml.safe_load(config_file)

          required_keys = ["project_id", "location", "gcs", "bigquery"]
          missing = [key for key in required_keys if key not in data]
          if missing:
              raise SystemExit(f"Missing required config keys: {missing}")

          print("pipeline_config.yaml is valid")
          PY

      - name: Install dbt BigQuery adapter
        run: |
          pip install dbt-bigquery

      - name: Prepare dbt profile
        run: |
          cp dbt/profiles/profiles.yml.example dbt/profiles/profiles.yml

      - name: Parse dbt project
        working-directory: dbt
        run: |
          dbt parse --profiles-dir profiles --target dev

  integration-bigquery:
    name: BigQuery Integration Validation
    runs-on: ubuntu-latest
    needs: validate-repo
    if: ${{ vars.GCP_PROJECT_ID != '' && vars.BQ_BRONZE_DATASET != '' && vars.BQ_SILVER_DATASET != '' && vars.BQ_GOLD_DATASET != '' && ((secrets.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && secrets.GCP_SERVICE_ACCOUNT != '') || secrets.GCP_CREDENTIALS != '') }}
    permissions:
      contents: read
      id-token: write
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION != '' && vars.GCP_REGION || 'us-central1' }}
      BQ_BRONZE_DATASET: ${{ vars.BQ_BRONZE_DATASET }}
      BQ_SILVER_DATASET: ${{ vars.BQ_SILVER_DATASET }}
      BQ_GOLD_DATASET: ${{ vars.BQ_GOLD_DATASET }}
      DBT_PROFILES_DIR: ${{ github.workspace }}/dbt/profiles
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud with workload identity federation
        id: auth_wif
        if: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && secrets.GCP_SERVICE_ACCOUNT != '' }}
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          create_credentials_file: true

      - name: Authenticate to Google Cloud with service account key
        id: auth_key
        if: ${{ !(secrets.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && secrets.GCP_SERVICE_ACCOUNT != '') && secrets.GCP_CREDENTIALS != '' }}
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}
          create_credentials_file: true

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r composer/requirements.txt
          pip install dbt-bigquery

      - name: Prepare dbt profile
        env:
          DBT_GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth_wif.outputs.credentials_file_path || steps.auth_key.outputs.credentials_file_path }}
        run: |
          cp dbt/profiles/profiles.yml.example dbt/profiles/profiles.yml

      - name: Validate dbt connection
        env:
          DBT_GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth_wif.outputs.credentials_file_path || steps.auth_key.outputs.credentials_file_path }}
        working-directory: dbt
        run: |
          dbt debug --profiles-dir profiles --target runtime

      - name: Build dbt silver and gold models
        env:
          DBT_GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth_wif.outputs.credentials_file_path || steps.auth_key.outputs.credentials_file_path }}
        working-directory: dbt
        run: |
          dbt build --profiles-dir profiles --target runtime --select path:models/silver path:models/gold
